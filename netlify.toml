[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Functions must be matched before the SPA catch-all
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
